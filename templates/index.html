{% extends "base.html" %}
{% block content %}
<h4 class="mb-4">数据概览</h4>

<!-- 未上传提示 -->
<div id="no-data-alert" class="alert alert-info d-none">
    <i class="bi bi-info-circle me-2"></i>请先上传数据文件（支持 CSV / Excel / JSON）
</div>

<!-- 指标卡片行 -->
<div id="stats-section" class="metrics-grid" style="display:none!important">
    <div class="metric-card" style="--accent-line: linear-gradient(90deg,#4F9FFF,#00D4FF)">
        <div class="metric-icon" style="background:rgba(79,159,255,.13);color:#4F9FFF">
            <i class="bi bi-table"></i>
        </div>
        <div>
            <div class="metric-value" id="stat-rows">—</div>
            <div class="metric-label">总记录数</div>
        </div>
    </div>
    <div class="metric-card" style="--accent-line: linear-gradient(90deg,#A78BFA,#7C3AED)">
        <div class="metric-icon" style="background:rgba(167,139,250,.13);color:#A78BFA">
            <i class="bi bi-layout-three-columns"></i>
        </div>
        <div>
            <div class="metric-value" id="stat-cols">—</div>
            <div class="metric-label">字段数</div>
        </div>
    </div>
    <div class="metric-card" style="--accent-line: linear-gradient(90deg,#00D4FF,#0EA5E9)">
        <div class="metric-icon" style="background:rgba(0,212,255,.12);color:#00D4FF">
            <i id="stat-col3-icon" class="bi bi-calendar-range"></i>
        </div>
        <div>
            <div class="metric-value" id="stat-col3" style="font-size:1rem">—</div>
            <div class="metric-label" id="stat-col3-label">时间跨度</div>
        </div>
    </div>
    <div class="metric-card" style="--accent-line: linear-gradient(90deg,#FFB347,#FF8C00)">
        <div class="metric-icon" style="background:rgba(255,179,71,.13);color:#FFB347">
            <i id="stat-col4-icon" class="bi bi-currency-dollar"></i>
        </div>
        <div>
            <div class="metric-value" id="stat-col4" style="font-size:1.4rem">—</div>
            <div class="metric-label" id="stat-col4-label">总销售额</div>
        </div>
    </div>
</div>

<!-- 数据质量评分卡 -->
<div id="quality-scorecard" class="quality-scorecard" style="display:none">
    <h5 class="mb-3" style="color:var(--blue)">
        <i class="bi bi-shield-check me-2"></i>数据质量评分卡
    </h5>
    <div class="quality-grid">
        <!-- 环形评分 -->
        <div class="quality-gauge">
            <div class="quality-ring">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="52" fill="none"
                            stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
                    <circle id="quality-ring-fill" cx="60" cy="60" r="52"
                            fill="none" stroke="var(--blue)" stroke-width="8"
                            stroke-linecap="round" stroke-dasharray="0 327"
                            transform="rotate(-90 60 60)" style="transition: stroke-dasharray 1s ease"/>
                </svg>
                <div class="quality-ring-text">
                    <span id="quality-score" style="font-size:28px;font-weight:700">--</span>
                    <span id="quality-grade" style="font-size:14px;color:var(--blue)">--</span>
                </div>
            </div>
        </div>
        <!-- 5 维度柱状条 -->
        <div class="quality-dimensions" id="quality-dimensions"></div>
    </div>
    <!-- 改进建议 -->
    <div id="quality-suggestions" class="quality-suggestions mt-3"></div>
</div>

<!-- 数据自描述卡片 -->
<div id="data-description-card" class="card mb-4" style="display:none">
    <div class="card-header d-flex align-items-center gap-2">
        <span id="profile-icon" style="font-size:1.1em">◈</span>
        <span id="profile-display-name" style="color:var(--cyan)">数据集类型检测中…</span>
    </div>
    <div class="card-body">
        <p id="data-description-text" class="mb-2" style="color:rgba(255,255,255,0.8);line-height:1.7"></p>
    </div>
</div>

<!-- 预处理摘要 -->
<div id="preprocess-section" class="card mb-4" style="display:none">
    <div class="card-header d-flex align-items-center justify-content-between">
        <span class="d-flex align-items-center gap-2">
            <i class="bi bi-gear" style="color:var(--cyan)"></i>
            预处理摘要
        </span>
        <button id="download-clean-btn" class="btn btn-outline-secondary btn-sm"
                onclick="downloadCleanData()" title="下载清洗后的数据">
            <i class="bi bi-download me-1"></i>下载清洗数据 CSV
        </button>
    </div>
    <div class="card-body p-0">
        <div class="prep-timeline px-4 py-2" id="prep-timeline"></div>
        <!-- 预处理可视化 -->
        <div id="preprocess-viz" class="px-4 pb-3" style="display:none">
            <div class="row g-3 mt-1">
                <div class="col-12 col-md-6">
                    <div style="font-size:0.8em;color:var(--blue);margin-bottom:4px">
                        <i class="bi bi-bar-chart-steps me-1"></i>清洗前后数据量对比
                    </div>
                    <div id="chart-preprocess-ba" style="height:160px"></div>
                </div>
                <div class="col-12 col-md-6">
                    <div style="font-size:0.8em;color:var(--cyan);margin-bottom:4px">
                        <i class="bi bi-table me-1"></i>各列缺失率
                    </div>
                    <div id="chart-missing-heatmap" style="height:160px"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 数据预览 -->
<div id="preview-section" class="card" style="display:none">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span class="d-flex align-items-center gap-2">
            <i class="bi bi-eye" style="color:var(--blue)"></i>数据预览
        </span>
        <span class="badge bg-secondary" id="preview-badge">0 行</span>
    </div>
    <div class="card-body p-0 overflow-auto" style="max-height:420px">
        <table class="table table-sm table-hover mb-0" id="preview-table">
            <thead class="sticky-top"><tr></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
/* ═══ 数据质量评分卡 ═══════════════════════════════════════ */
.quality-scorecard {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(79,159,255,0.1);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 24px;
    animation: qs-fade-in .5s ease;
}
@keyframes qs-fade-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.quality-grid {
    display: flex;
    gap: 32px;
    align-items: stretch;
    flex-wrap: wrap;
}

.quality-gauge {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.quality-ring {
    position: relative;
    width: 120px;
    height: 120px;
}

.quality-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
}

.quality-dimensions {
    flex: 1;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
}

.quality-dim-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.quality-dim-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #A0B0C8;
}

.quality-dim-bar-bg {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
}

.quality-dim-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
}

.quality-suggestions {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 14px;
}

.quality-suggestion-item {
    font-size: 12px;
    color: #8899B8;
    padding: 5px 0;
    display: flex;
    align-items: flex-start;
    gap: 6px;
}
</style>
<script>
window.initOverviewPage = async function () {
    try {
        const [sRes, pRes, prepRes] = await Promise.all([
            fetch("/api/data/summary"),
            fetch("/api/data/preview?n=50"),
            fetch("/api/data/preprocess-report"),
        ]);
        if (!sRes.ok) {
            document.getElementById("no-data-alert").classList.remove("d-none");
            return;
        }
        document.getElementById("no-data-alert").classList.add("d-none");

        const summary = await sRes.json();
        const preview = await pRes.json();
        const prep    = await prepRes.json();

        renderMetrics(summary);
        renderPrepTimeline(prep);
        renderPreviewTable(preview);

        // Animate the metrics grid in
        const statsEl = document.getElementById("stats-section");
        statsEl.style.removeProperty("display");
        statsEl.querySelectorAll(".metric-card").forEach((el, i) => {
            el.style.opacity = "0";
            el.style.transform = "translateY(16px)";
            setTimeout(() => {
                el.style.transition = "all 0.4s cubic-bezier(.4,0,.2,1)";
                el.style.opacity = "1";
                el.style.transform = "translateY(0)";
            }, i * 80);
        });

        document.getElementById("preprocess-section").style.display = "block";
        document.getElementById("preview-section").style.display    = "block";

        // 加载数据质量评分卡
        if (typeof fetchQualityScore === 'function') fetchQualityScore();

        // 加载数据自描述与预处理可视化
        loadDataProfile();
        loadPreprocessViz();
    } catch (e) {
        console.error("概览页加载失败:", e);
    }
};

function renderMetrics(s) {
    // Animate counter
    function animateNum(el, target, decimals = 0) {
        if (isNaN(target)) { el.textContent = target; return; }
        let start = 0, duration = 800, step = 16;
        let timer = setInterval(() => {
            start = Math.min(start + target * step / duration, target);
            el.textContent = start.toLocaleString(undefined, { maximumFractionDigits: decimals });
            if (start >= target) clearInterval(timer);
        }, step);
    }

    animateNum(document.getElementById("stat-rows"), s.row_count || 0);
    animateNum(document.getElementById("stat-cols"), s.column_count || 0);

    const dr = s.date_range || {};
    const col3El = document.getElementById("stat-col3");
    if (col3El) col3El.textContent =
        dr.start ? `${dr.start.slice(0,10)} ~ ${(dr.end||"").slice(0,10)}` : "—";

    const ns = s.numeric_stats || {};
    const amtKey = Object.keys(ns).find(k => /amount|total|revenue/i.test(k));
    if (amtKey && ns[amtKey].sum != null) {
        const col4El = document.getElementById("stat-col4");
        if (col4El) animateNum(col4El, Number(ns[amtKey].sum), 0);
    }
}

function renderPrepTimeline(prep) {
    const steps = [
        ["去重",           prep.remove_duplicates?.removed != null
            ? `移除 <strong>${prep.remove_duplicates.removed.toLocaleString()}</strong> 条重复记录` : "无"],
        ["缺失值处理", (() => {
            const m   = prep.handle_missing || {};
            const f   = Object.keys(m.filled_cols || {}).length;
            const d   = (m.high_missing_cols || []).length;
            return `填充 <strong>${f}</strong> 列，删除 <strong>${d}</strong> 高缺失列`;
        })()],
        ["类型转换",       (() => {
            const c = Object.keys(prep.convert_types?.converted || {}).length;
            return c ? `转换 <strong>${c}</strong> 列` : "无需转换";
        })()],
        ["无效记录",       prep.filter_invalid_records?.removed != null
            ? `过滤 <strong>${prep.filter_invalid_records.removed.toLocaleString()}</strong> 条无效记录` : "—"],
        ["异常值",         prep.filter_outliers?.flagged != null
            ? `标记 <strong>${prep.filter_outliers.flagged}</strong> 个异常值` : "—"],
        ["新增特征",       (() => {
            const a = prep.add_features?.added || [];
            return a.length ? a.map(f => `<span class="badge bg-secondary me-1">${f}</span>`).join("") : "无";
        })()],
        ["最终记录数",     prep.final_rows != null
            ? `<strong style="color:var(--green)">${prep.final_rows.toLocaleString()}</strong> 条` : "—"],
    ];
    document.getElementById("prep-timeline").innerHTML = steps.map(([name, val]) => `
        <div class="prep-step">
            <div class="prep-dot"></div>
            <span class="prep-step-name">${name}</span>
            <span class="prep-step-val">${val}</span>
        </div>
    `).join("");
}

function renderPreviewTable(rows) {
    if (!rows?.length) return;
    const table = document.getElementById("preview-table");
    const cols  = Object.keys(rows[0]);
    table.querySelector("thead tr").innerHTML = cols.map(c => `<th>${c}</th>`).join("");
    table.querySelector("tbody").innerHTML    = rows.map(row =>
        `<tr>${cols.map(c => `<td>${row[c] ?? ""}</td>`).join("")}</tr>`
    ).join("");
    document.getElementById("preview-badge").textContent = `${rows.length} 行`;
}

// ── 数据自描述 ─────────────────────────────────────────────
async function loadDataProfile() {
    try {
        const r = await fetch('/api/analysis/data_profile');
        if (!r.ok) return;
        const p = await r.json();

        // 数据自描述卡片
        const card = document.getElementById('data-description-card');
        if (card) {
            document.getElementById('profile-icon').textContent = p.icon || '◈';
            document.getElementById('profile-display-name').textContent =
                (p.display_name || '混合型') + '数据集';
            document.getElementById('data-description-text').textContent =
                p.description || '';
            card.style.display = '';
        }

        // 自适应统计卡（第3、4卡）
        _updateAdaptiveStatCards(p);

    } catch(e) { /* 静默失败 */ }
}

function _updateAdaptiveStatCards(profile) {
    const mode = profile.mode || 'mixed';
    const col3Label = document.getElementById('stat-col3-label');
    const col3Val   = document.getElementById('stat-col3');
    const col3Icon  = document.getElementById('stat-col3-icon');
    const col4Label = document.getElementById('stat-col4-label');
    const col4Val   = document.getElementById('stat-col4');
    const col4Icon  = document.getElementById('stat-col4-icon');
    if (!col3Label) return;

    if (mode === 'numeric' || mode === 'categorical') {
        col3Label.textContent = '数值列数';
        col3Icon.className    = 'bi bi-123';
        col3Val.textContent   = (profile.numeric_cols || []).length || '—';

        const targetCol = profile.target_col;
        col4Label.textContent = targetCol ? `${targetCol} 均值` : '类别列数';
        col4Icon.className    = targetCol ? 'bi bi-bullseye' : 'bi bi-tags';
        col4Val.textContent   = '—';  // 实际值从 summary 获取
    } else if (mode === 'geographic') {
        col3Label.textContent = '数值列数';
        col3Icon.className    = 'bi bi-123';
        col3Val.textContent   = (profile.numeric_cols || []).length || '—';
        col4Label.textContent = '地理列';
        col4Icon.className    = 'bi bi-geo-alt';
        col4Val.textContent   = profile.geo_col || '—';
    }
    // retail / temporal 保持原样（时间跨度 + 总销售额）
}

// ── 预处理可视化 ───────────────────────────────────────────
async function loadPreprocessViz() {
    if (typeof Plotly === 'undefined') return;
    try {
        const r = await fetch('/api/analysis/preprocess_visual');
        if (!r.ok) return;
        const viz = await r.json();

        // 清洗前后对比图
        const baData = viz.before_after || [];
        if (baData.length > 0) {
            const steps   = baData.map(d => d.step);
            const removed = baData.map(d => d.removed || 0);
            Plotly.newPlot('chart-preprocess-ba', [{
                type: 'bar', x: steps, y: removed,
                marker: { color: ['rgba(79,159,255,0.8)', 'rgba(0,212,255,0.8)'] },
                text: removed.map(v => v > 0 ? v + ' 行' : '无变化'),
                textposition: 'auto',
            }], {
                paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                font: { color: '#fff', size: 11 },
                margin: { t: 10, b: 30, l: 40, r: 10 },
                yaxis: { gridcolor: 'rgba(255,255,255,0.08)' },
                showlegend: false,
            }, { responsive: true, displayModeBar: false });
        }

        // 缺失率热力图（横向条形图）
        const missing = (viz.missing_heatmap || []).filter(d => d.missing_count > 0);
        if (missing.length > 0) {
            const cols = missing.map(d => d.col);
            const pcts = missing.map(d => d.missing_pct);
            Plotly.newPlot('chart-missing-heatmap', [{
                type: 'bar', orientation: 'h',
                x: pcts, y: cols,
                marker: { color: pcts.map(p => p > 10 ? 'rgba(255,76,76,0.8)' : 'rgba(79,255,140,0.8)') },
                text: pcts.map(p => p.toFixed(1) + '%'),
                textposition: 'auto',
            }], {
                paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                font: { color: '#fff', size: 10 },
                margin: { t: 10, b: 20, l: 100, r: 30 },
                xaxis: { title: '缺失率 (%)', gridcolor: 'rgba(255,255,255,0.08)' },
            }, { responsive: true, displayModeBar: false });
        } else {
            // 无缺失值 → 显示绿色提示
            document.getElementById('chart-missing-heatmap').innerHTML =
                '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--green)">' +
                '<i class="bi bi-check-circle me-2"></i>所有列均无缺失值</div>';
        }

        document.getElementById('preprocess-viz').style.display = '';
    } catch(e) { /* 静默失败 */ }
}

// ── 下载清洗后数据 ─────────────────────────────────────────
function downloadCleanData() {
    window.location.href = '/api/data/download-clean';
}

window.initOverviewPage();
</script>
{% endblock %}
