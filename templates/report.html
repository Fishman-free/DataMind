{% extends "base.html" %}
{% block content %}
<h4 class="mb-3">分析报告</h4>

<div id="no-data-alert" class="alert alert-info">
    <i class="bi bi-info-circle me-2"></i>请先上传数据文件，然后生成报告
</div>

<div id="report-section" style="display:none">
    <!-- 模式切换 -->
    <div class="d-flex align-items-center gap-2 mb-3" id="mode-selector">
        <span class="text-muted small me-1" style="white-space:nowrap">报告模式：</span>
        <div class="btn-group btn-group-sm" role="group">
            <input type="radio" class="btn-check" name="report-mode" id="mode-simple"
                   value="simple" checked>
            <label class="btn btn-outline-primary" for="mode-simple">
                <i class="bi bi-file-text me-1"></i>简洁报告
            </label>
            <input type="radio" class="btn-check" name="report-mode" id="mode-detailed"
                   value="detailed">
            <label class="btn btn-outline-warning" for="mode-detailed">
                <i class="bi bi-stars me-1"></i>深度报告 · 多 Agent
            </label>
            <input type="radio" class="btn-check" name="report-mode" id="mode-story"
                   value="story">
            <label class="btn btn-outline-success" for="mode-story">
                <i class="bi bi-book me-1"></i>数据故事
            </label>
        </div>
        <span class="text-muted small ms-2" id="mode-hint"
              style="font-size:11px; opacity:.7">精简快速</span>
    </div>

    <!-- 操作栏 -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <button class="btn btn-primary d-flex align-items-center gap-2" id="gen-btn"
                onclick="generateReport()">
            <i class="bi bi-magic"></i>生成分析报告
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2"
                id="download-btn" style="display:none" onclick="downloadReport()">
            <i class="bi bi-download"></i>下载 Markdown
        </button>
        <span id="report-timestamp" class="text-muted small ms-auto"></span>
    </div>

    <!-- 错误提示 -->
    <div id="report-error" class="alert alert-danger" style="display:none"></div>

    <!-- 报告内容 -->
    <div id="report-container" style="display:none">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-file-earmark-text" style="color:var(--blue)"></i>
                <span id="report-title">DataMind 数据分析报告</span>
            </div>
            <div class="card-body report-content" id="report-html"></div>
        </div>
    </div>

    <!-- 数据故事展示区 -->
    <div id="story-container" style="display:none">
        <div class="story-hero">
            <h2 id="story-title" class="story-title"></h2>
            <p id="story-subtitle" class="story-subtitle text-muted"></p>
        </div>
        <div id="story-sections" class="story-sections"></div>
        <div class="story-takeaways mt-4">
            <h5><i class="bi bi-lightbulb me-2" style="color:var(--yellow)"></i>核心结论</h5>
            <ul id="story-takeaways-list" class="list-unstyled"></ul>
        </div>
    </div>
</div>

<!-- ═══════════════ AI 思考过程可视化 Overlay ═══════════════ -->
<div id="ai-thinking-overlay">
    <!-- 扫描线 -->
    <div class="atk-scan-line"></div>

    <div class="atk-box">
        <!-- 顶部标题栏 -->
        <div class="atk-header">
            <div class="atk-orb-wrap">
                <div class="atk-orb"></div>
                <div class="atk-orb-ring"></div>
            </div>
            <div class="atk-header-text">
                <span class="atk-title">AI 分析引擎</span>
                <span class="atk-tag" id="atk-tag">INITIALIZING</span>
            </div>
            <div class="atk-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- 步骤列表 -->
        <div class="atk-steps" id="atk-steps"></div>

        <!-- 实时思考流 -->
        <div class="atk-thought-box">
            <span class="atk-cursor">▍</span>
            <span id="atk-thought"></span>
        </div>

        <!-- 进度条 -->
        <div class="atk-progress-wrap">
            <div class="atk-progress-bar" id="atk-progress-bar"></div>
        </div>
        <div class="atk-progress-label">
            <span id="atk-pct">0%</span>
            <span id="atk-elapsed">0.0s</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
/* ═══ AI Thinking Overlay ═══════════════════════════════════ */
#ai-thinking-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 900;
    align-items: center;
    justify-content: center;
    background: rgba(6, 9, 18, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: opacity .35s ease;
}
#ai-thinking-overlay.atk-show {
    display: flex;
}
.atk-scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79,159,255,0.6), rgba(0,212,255,0.8), rgba(79,159,255,0.6), transparent);
    animation: atk-scan 3s linear infinite;
    pointer-events: none;
    z-index: 901;
}
@keyframes atk-scan {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
}

.atk-box {
    width: 500px;
    max-width: calc(100vw - 32px);
    background: linear-gradient(145deg,
        rgba(15,22,45,0.97) 0%,
        rgba(8,13,28,0.99) 100%);
    border: 1px solid rgba(79,159,255,0.28);
    border-radius: 20px;
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
    box-shadow:
        0 0 0 1px rgba(0,212,255,0.06) inset,
        0 0 60px rgba(79,159,255,0.12),
        0 20px 60px rgba(0,0,0,0.6);
    animation: atk-appear .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes atk-appear {
    from { opacity:0; transform:scale(.92) translateY(16px); }
    to   { opacity:1; transform:scale(1)   translateY(0);    }
}

/* 顶部 */
.atk-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
}
.atk-orb-wrap {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
}
.atk-orb {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 32%,
        #a0e8ff 0%, #4F9FFF 40%, #7C3AED 85%);
    box-shadow: 0 0 18px rgba(79,159,255,0.7), 0 0 40px rgba(0,212,255,0.3);
    animation: atk-orb-pulse 2.2s ease-in-out infinite;
}
@keyframes atk-orb-pulse {
    0%,100%{ transform:scale(1);   box-shadow:0 0 18px rgba(79,159,255,.7),0 0 40px rgba(0,212,255,.3); }
    50%    { transform:scale(1.1); box-shadow:0 0 28px rgba(79,159,255,1),0 0 60px rgba(0,212,255,.5); }
}
.atk-orb-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(79,159,255,0.35);
    animation: atk-ring 2.2s ease-in-out infinite;
}
@keyframes atk-ring {
    0%,100%{ transform:scale(1);   opacity:.5; }
    50%    { transform:scale(1.15); opacity:1; }
}
.atk-header-text { flex: 1; }
.atk-title {
    display: block;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .04em;
    color: #E8EEFF;
}
.atk-tag {
    display: inline-block;
    margin-top: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    color: #00D4FF;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 4px;
    padding: 1px 7px;
    animation: atk-blink 1.4s step-end infinite;
}
@keyframes atk-blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.atk-dots { display:flex; gap:5px; align-items:center; }
.atk-dots span {
    width:7px; height:7px; border-radius:50%;
    background: rgba(79,159,255,0.5);
    animation: atk-dot-bounce .9s ease-in-out infinite;
}
.atk-dots span:nth-child(2){ animation-delay:.15s; }
.atk-dots span:nth-child(3){ animation-delay:.3s; }
@keyframes atk-dot-bounce {
    0%,100%{ transform:translateY(0);   opacity:.4; }
    50%    { transform:translateY(-5px); opacity:1;  }
}

/* 步骤列表 */
.atk-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
}
.atk-step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    transition: all .3s ease;
    opacity: .35;
}
.atk-step.active {
    opacity: 1;
    background: rgba(79,159,255,0.08);
    border-color: rgba(79,159,255,0.2);
}
.atk-step.done {
    opacity: .75;
    background: rgba(52,211,153,0.04);
    border-color: rgba(52,211,153,0.12);
}
.atk-step-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    background: rgba(79,159,255,0.12);
    color: #8899B8;
    flex-shrink: 0;
    transition: all .3s ease;
}
.atk-step.active .atk-step-icon {
    background: rgba(79,159,255,0.2);
    color: #4F9FFF;
    animation: atk-icon-spin 1.2s linear infinite;
}
.atk-step.done .atk-step-icon {
    background: rgba(52,211,153,0.15);
    color: #34D399;
    animation: none;
}
@keyframes atk-icon-spin {
    0%  { box-shadow:0 0 0 0 rgba(79,159,255,0.4); }
    70% { box-shadow:0 0 0 8px rgba(79,159,255,0);  }
    100%{ box-shadow:0 0 0 0 rgba(79,159,255,0);  }
}
.atk-step-label {
    flex: 1;
    font-size: 13px;
    color: #8899B8;
    transition: color .3s;
}
.atk-step.active .atk-step-label { color: #C8D4F0; }
.atk-step.done  .atk-step-label { color: #8899B8; }
.atk-step-time {
    font-size: 11px;
    color: #34D399;
    opacity: 0;
    transition: opacity .3s;
    letter-spacing: .03em;
}
.atk-step.done .atk-step-time { opacity: 1; }

/* 实时思考流 */
.atk-thought-box {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(79,159,255,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    min-height: 40px;
    margin-bottom: 16px;
    font-family: "JetBrains Mono", "Fira Code", monospace;
    font-size: 12px;
    color: rgba(0,212,255,0.8);
    display: flex;
    align-items: center;
    gap: 6px;
}
.atk-cursor {
    color: #4F9FFF;
    animation: atk-cur-blink .8s step-end infinite;
}
@keyframes atk-cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }
#atk-thought { transition: opacity .25s ease; }

/* 进度条 */
.atk-progress-wrap {
    height: 3px;
    background: rgba(79,159,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
}
.atk-progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    background: linear-gradient(90deg, #4F9FFF, #00D4FF, #A78BFA);
    background-size: 200% 100%;
    animation: atk-progress-glow 2s linear infinite;
    transition: width .6s cubic-bezier(.4,0,.2,1);
}
@keyframes atk-progress-glow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}
.atk-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(136,153,184,0.7);
    letter-spacing: .03em;
}

/* ═══ 数据故事展示区 ═══════════════════════════════════════ */
.story-hero {
    text-align: center;
    padding: 32px 16px 24px;
}
.story-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #E8EEFF;
    letter-spacing: .02em;
}
.story-subtitle {
    font-size: .95rem;
    margin-top: 6px;
}
.story-sections {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.story-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(79,159,255,0.08);
    border-radius: 12px;
    padding: 20px 24px;
}
.story-section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: #C8D4F0;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}
.story-section-num {
    font-size: .82rem;
    font-weight: 700;
    color: var(--blue, #4F9FFF);
    background: rgba(79,159,255,0.1);
    border-radius: 6px;
    padding: 2px 8px;
    letter-spacing: .04em;
}
.story-highlight {
    display: inline-block;
    margin: 6px 0 10px;
    padding: 4px 12px;
    border-radius: 6px;
    background: rgba(79,159,255,0.12);
    border: 1px solid rgba(79,159,255,0.25);
    font-size: .82rem;
    font-weight: 600;
    color: #4F9FFF;
    letter-spacing: .02em;
}
.story-section-body {
    font-size: .92rem;
    line-height: 1.8;
    color: #A0B0C8;
}
.story-section-body p {
    margin-bottom: 8px;
}
.story-chart {
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
}
.story-takeaways {
    background: rgba(255,179,71,0.04);
    border: 1px solid rgba(255,179,71,0.12);
    border-radius: 12px;
    padding: 20px 24px;
}
.story-takeaways li {
    font-size: .92rem;
    color: #C0C8D8;
    line-height: 1.7;
}
</style>

<script>
// ── 步骤定义（简单 & 详细两套）──────────────────────────────
const _STEPS_SIMPLE = [
    { icon: "◈", label: "初始化分析引擎" },
    { icon: "⟁", label: "读取数据集特征" },
    { icon: "⚡", label: "时序模式分析" },
    { icon: "⬡", label: "关键业务指标计算" },
    { icon: "◎", label: "AI 推理整合" },
    { icon: "✦", label: "生成 Markdown 报告" },
];

const _STEPS_DETAILED = [
    { icon: "◈", label: "初始化多 Agent 框架" },
    { icon: "📊", label: "StatisticsAgent：数据特征统计描述" },
    { icon: "🔍", label: "InsightAgent：关键洞察深度解读" },
    { icon: "💬", label: "QAAgent：对话问答摘要分析" },
    { icon: "🧠", label: "SynthesisAgent：综合总结与建议" },
    { icon: "✦", label: "整合 Agent 输出，生成深度报告" },
];

const _THOUGHTS_SIMPLE = [
    "扫描交易记录，提取时间特征向量...",
    "发现周期性购买行为，建立时间序列模型...",
    "计算 RFM 三维客户价值分布...",
    "识别 Top 商品 → 分析营收贡献度...",
    "UK 市场占比计算，绘制地域热力图...",
    "检测 IQR 异常值，统计离群点分布...",
    "Pearson 相关系数矩阵计算中...",
    "整合洞察数据，构建结构化报告框架...",
    "LLM 推理层：语义化业务指标叙述...",
    "Markdown 排版优化，生成最终报告...",
];

const _THOUGHTS_DETAILED = [
    "初始化四 Agent 协作框架...",
    "StatisticsAgent 分析数据集维度与分布特征...",
    "StatisticsAgent 计算数值列偏态与峰度统计...",
    "InsightAgent 读取高严重度洞察，解读业务影响...",
    "InsightAgent 按优先级排序并展开每条洞察...",
    "QAAgent 提取对话历史中的核心探索路径...",
    "QAAgent 归纳用户关注点与 AI 关键发现...",
    "SynthesisAgent 汇聚三路 Agent 输出...",
    "SynthesisAgent 生成执行摘要与行动建议...",
    "整合四个 Agent 输出，组装 ~3000 字深度报告...",
];

const _THOUGHTS_STORY = [
    "初始化数据叙事引擎...",
    "扫描数据中的关键趋势与转折点...",
    "提取核心叙事线索与业务情节...",
    "构建数据故事的主线框架...",
    "为关键图表生成叙事解说...",
    "识别数据中的冲突与反转点...",
    "将统计指标转化为业务语言...",
    "生成故事化章节段落...",
    "整合核心结论与关键启示...",
    "润色叙事节奏，生成最终故事...",
];

let _reportMarkdown = "";
let _thoughtTimer = null, _progressTimer = null, _stepTimers = [], _elapsedTimer = null;
let _stepDone = [], _startTime = 0, _currentStepCount = 6;

// ── 模式切换提示文字 ───────────────────────────────────────────
function _initModeHints() {
    document.querySelectorAll("input[name='report-mode']").forEach(radio => {
        radio.addEventListener("change", () => {
            const hint = document.getElementById("mode-hint");
            hint.textContent = radio.value === "detailed"
                ? "4 Agent 协作，深度分析 ~3000 字，耗时较长"
                : radio.value === "story"
                    ? "数据叙事，将分析结果转化为生动的数据故事"
                    : "精简快速";
        });
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _initModeHints);
} else {
    _initModeHints();
}

(async function () {
    const res = await fetch("/api/data/summary");
    if (res.ok) {
        document.getElementById("no-data-alert").style.display  = "none";
        document.getElementById("report-section").style.display = "block";
    }
})();

// ── 构建步骤列表 ──────────────────────────────────────────────
function _buildSteps(mode) {
    const steps = mode === "detailed" ? _STEPS_DETAILED : _STEPS_SIMPLE;
    _stepDone = new Array(steps.length).fill(false);
    const container = document.getElementById("atk-steps");
    container.innerHTML = steps.map((s, i) => `
        <div class="atk-step" id="atk-step-${i}">
            <div class="atk-step-icon" id="atk-icon-${i}">${s.icon}</div>
            <span class="atk-step-label">${s.label}</span>
            <span class="atk-step-time" id="atk-time-${i}"></span>
        </div>
    `).join("");
    return steps.length;
}

function _activateStep(i) {
    // 完成上一步
    if (i > 0) _completeStep(i - 1);
    const el = document.getElementById(`atk-step-${i}`);
    if (!el) return;
    el.classList.add("active");
    document.getElementById(`atk-icon-${i}`).textContent = "◉";
    document.getElementById("atk-tag").textContent = "RUNNING";
}

function _completeStep(i) {
    const el = document.getElementById(`atk-step-${i}`);
    if (!el || _stepDone[i]) return;
    _stepDone[i] = true;
    el.classList.remove("active");
    el.classList.add("done");
    document.getElementById(`atk-icon-${i}`).textContent = "✓";
    const elapsed = ((Date.now() - _startTime) / 1000).toFixed(1);
    document.getElementById(`atk-time-${i}`).textContent = `${elapsed}s`;
}

async function _completeAllSteps(stepCount) {
    for (let i = 0; i < stepCount; i++) {
        _completeStep(i);
        await _sleep(80);
    }
    document.getElementById("atk-tag").textContent = "DONE";
}

function _sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── 显示 / 隐藏 Overlay ───────────────────────────────────────
function _showOverlay(mode) {
    const stepCount = _buildSteps(mode);
    _currentStepCount = stepCount;
    _startTime = Date.now();

    const overlay = document.getElementById("ai-thinking-overlay");
    overlay.classList.add("atk-show");

    // 自动推进步骤：详细模式耗时更长，每步间隔更大
    const baseSchedule = mode === "detailed"
        ? [0, 1200, 3000, 5500, 8500, 12000]
        : [0, 700, 1600, 2800, 4500, 6800];
    _stepTimers = baseSchedule.slice(0, stepCount).map((t, i) =>
        setTimeout(() => _activateStep(i), t)
    );

    // 思考文字轮播
    const thoughts = mode === "detailed" ? _THOUGHTS_DETAILED
                   : mode === "story" ? _THOUGHTS_STORY
                   : _THOUGHTS_SIMPLE;
    let thoughtIdx = 0;
    const thoughtEl = document.getElementById("atk-thought");
    thoughtEl.textContent = thoughts[0];
    _thoughtTimer = setInterval(() => {
        thoughtEl.style.opacity = "0";
        setTimeout(() => {
            thoughtIdx = (thoughtIdx + 1) % thoughts.length;
            thoughtEl.textContent = thoughts[thoughtIdx];
            thoughtEl.style.opacity = "1";
        }, 250);
    }, mode === "detailed" ? 3200 : 2400);

    // 进度条非线性推进（最多到 88%，等 API 返回后推满）
    let pct = 0;
    const barEl = document.getElementById("atk-progress-bar");
    const pctEl = document.getElementById("atk-pct");
    _progressTimer = setInterval(() => {
        if (pct < 88) {
            const step = pct < 30 ? 3.5 : pct < 60 ? 1.8 : 0.6;
            pct = Math.min(pct + step * (0.5 + Math.random()), 88);
            barEl.style.width = pct.toFixed(1) + "%";
            pctEl.textContent = Math.round(pct) + "%";
        }
    }, 220);

    // 计时器
    const elapsedEl = document.getElementById("atk-elapsed");
    _elapsedTimer = setInterval(() => {
        const s = ((Date.now() - _startTime) / 1000).toFixed(1);
        elapsedEl.textContent = s + "s";
    }, 100);
}

async function _hideOverlay() {
    _stepTimers.forEach(clearTimeout);
    clearInterval(_thoughtTimer);
    clearInterval(_progressTimer);
    clearInterval(_elapsedTimer);

    // 完成剩余步骤
    try { await _completeAllSteps(_currentStepCount); } catch(e) { /* 防御性捕获 */ }

    // 进度条推满
    const barEl = document.getElementById("atk-progress-bar");
    const pctEl = document.getElementById("atk-pct");
    barEl.style.width = "100%";
    pctEl.textContent = "100%";

    await _sleep(500);

    const overlay = document.getElementById("ai-thinking-overlay");
    overlay.style.opacity = "0";
    overlay.style.transition = "opacity .35s ease";
    await _sleep(360);
    overlay.classList.remove("atk-show");
    overlay.style.opacity = "";
    overlay.style.transition = "";
}

// ── 生成报告 ──────────────────────────────────────────────────
async function generateReport() {
    const modeEl = document.querySelector("input[name='report-mode']:checked");
    const mode   = modeEl ? modeEl.value : "simple";

    document.getElementById("gen-btn").disabled   = true;
    document.getElementById("report-error").style.display = "none";

    // 隐藏所有展示容器
    document.getElementById("report-container").style.display = "none";
    document.getElementById("story-container").style.display = "none";

    // ── 数据故事模式 ──────────────────────────────────────
    if (mode === "story") {
        _showOverlay(mode);
        try {
            const res  = await fetch("/api/report/story", {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
            });
            const data = await res.json();
            await _hideOverlay();

            if (!res.ok) {
                const errEl = document.getElementById("report-error");
                errEl.textContent   = data.error || "数据故事生成失败";
                errEl.style.display = "block";
                return;
            }

            // 先显示容器，再渲染内容，确保入场动画在可见元素上执行
            document.getElementById("story-container").style.display = "block";
            renderStory(data);

            // 构建故事 Markdown 文本供下载（含 highlight）
            var md = '# ' + (data.title || '数据故事') + '\n\n';
            if (data.subtitle) md += '> ' + data.subtitle + '\n\n';
            if (data.sections) {
                data.sections.forEach(function (sec, i) {
                    md += '## ' + (i + 1) + '. ' + (sec.heading || sec.title || '') + '\n\n';
                    if (sec.highlight) md += '**' + sec.highlight + '**\n\n';
                    md += (sec.body || sec.narrative || sec.content || '') + '\n\n';
                });
            }
            var takeaways = data.key_takeaways || data.takeaways;
            if (takeaways && takeaways.length) {
                md += '## 核心结论\n\n';
                takeaways.forEach(function (t) { md += '- ' + t + '\n'; });
            }
            _reportMarkdown = md;
            document.getElementById("download-btn").style.display = "flex";
        } catch (e) {
            await _hideOverlay();
            const errEl = document.getElementById("report-error");
            errEl.textContent   = "网络错误：" + e.message;
            errEl.style.display = "block";
        } finally {
            document.getElementById("gen-btn").disabled = false;
        }
        return;
    }

    // ── 简洁 / 详细模式 ──────────────────────────────────
    _showOverlay(mode);

    // 尝试 SSE 流式（详细模式优先）
    if (mode === "detailed" && typeof supportsSSE === 'function' && supportsSSE()) {
        try {
            await _handleReportSSE(mode);
            return;
        } catch (sseErr) {
            console.warn("SSE 流式失败，回退到标准请求:", sseErr);
            // 回退到标准 POST
        }
    }

    try {
        const res  = await fetch("/api/report/generate", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ mode }),
        });
        const data = await res.json();

        await _hideOverlay();

        if (!res.ok) {
            const errEl = document.getElementById("report-error");
            errEl.textContent   = data.error || "报告生成失败";
            errEl.style.display = "block";
            return;
        }

        _reportMarkdown = data.content || "";
        const modeLabel = data.mode === "detailed" ? " · 深度报告（4 Agent）" : "";
        document.getElementById("report-title").textContent     = (data.title || "DataMind 数据分析报告") + modeLabel;
        document.getElementById("report-timestamp").textContent = data.generated_at ? `生成于 ${data.generated_at}` : "";
        // 用客户端 marked 渲染，避免服务端 HTML 转义/缓存问题
        const mdContent = data.content || "";
        document.getElementById("report-html").innerHTML = window.marked
            ? marked.parse(mdContent)
            : (data.html || mdContent);

        const container = document.getElementById("report-container");
        container.style.display   = "block";
        container.style.opacity   = "0";
        container.style.transform = "translateY(12px)";
        requestAnimationFrame(() => {
            container.style.transition = "all 0.45s cubic-bezier(.16,1,.3,1)";
            container.style.opacity    = "1";
            container.style.transform  = "translateY(0)";
        });

        document.getElementById("download-btn").style.display = "flex";

    } catch (e) {
        await _hideOverlay();
        const errEl = document.getElementById("report-error");
        errEl.textContent   = "网络错误：" + e.message;
        errEl.style.display = "block";
    } finally {
        document.getElementById("gen-btn").disabled = false;
    }
}

// ── SSE 流式报告处理 ─────────────────────────────────────────
function _handleReportSSE(mode) {
    return fetch('/api/report/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: mode, stream: 'true' }),
    }).then(async function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';
        let agentSections = {};

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const dataStr = line.substring(6);
                if (dataStr === '[DONE]') continue;

                try {
                    const msg = JSON.parse(dataStr);

                    switch (msg.type) {
                        case 'report_start':
                            document.getElementById('report-container').style.display = 'block';
                            break;

                        case 'agent_progress':
                            var agentNames = {
                                'statistics': 1, 'insight': 2, 'qa': 3, 'synthesis': 4
                            };
                            var stepIdx = agentNames[msg.agent];
                            if (stepIdx !== undefined) _activateStep(stepIdx);
                            break;

                        case 'agent_error':
                            console.warn('Agent error:', msg.agent, msg.message);
                            break;

                        case 'error':
                            console.error('SSE 错误：', msg.message);
                            var errEl = document.getElementById("report-error");
                            if (errEl) {
                                errEl.textContent = msg.message || '报告生成过程中发生错误';
                                errEl.style.display = 'block';
                            }
                            break;

                        case 'section':
                            agentSections[msg.agent] = msg.content;
                            fullContent = [
                                agentSections['statistics'] || '',
                                agentSections['insight'] || '',
                                agentSections['qa'] || '',
                                agentSections['synthesis'] || '',
                            ].filter(Boolean).join('\n\n---\n\n');

                            var reportEl = document.getElementById('report-html');
                            reportEl.innerHTML = window.marked
                                ? marked.parse(fullContent)
                                : fullContent.replace(/\n/g, '<br>');
                            break;

                        case 'report_done':
                            _reportMarkdown = fullContent;
                            // 设置标题和时间戳
                            document.getElementById("report-title").textContent = "DataMind 深度数据分析报告 · 深度报告（4 Agent）";
                            document.getElementById("report-timestamp").textContent = "生成于 " + new Date().toLocaleString();
                            // 添加一级标题包装
                            var wrappedContent = '# DataMind 深度数据分析报告\n\n' +
                                '> 本报告由 4 个专注 AI Agent 协作生成\n\n---\n\n' +
                                fullContent;
                            _reportMarkdown = wrappedContent;
                            document.getElementById('report-html').innerHTML = window.marked
                                ? marked.parse(wrappedContent)
                                : wrappedContent.replace(/\n/g, '<br>');
                            document.getElementById('download-btn').style.display = 'flex';
                            break;
                    }
                } catch (e) {
                    // skip malformed JSON
                }
            }
        }

        document.getElementById("gen-btn").disabled = false;
        await _hideOverlay();
    });
}

// ── 数据故事渲染 ─────────────────────────────────────────────
/**
 * 渲染数据故事到 story-container。
 * @param {object} data - /api/report/story 返回的数据
 */
function renderStory(data) {
    // 标题 & 副标题
    document.getElementById("story-title").textContent    = data.title || "数据故事";
    document.getElementById("story-subtitle").textContent = data.subtitle || "";

    // 故事章节
    const sectionsEl = document.getElementById("story-sections");
    if (sectionsEl && data.sections) {
        sectionsEl.innerHTML = data.sections.map(function (sec, i) {
            const chartHtml = sec.chart_html || sec.chart || "";
            const highlight = sec.highlight || "";
            return '<div class="story-section" style="animation: qs-fade-in .5s ease ' + (i * 0.12) + 's both">' +
                '<h4 class="story-section-title">' +
                    '<span class="story-section-num">' + (i + 1).toString().padStart(2, '0') + '</span>' +
                    (sec.heading || sec.title || '') +
                '</h4>' +
                (highlight ? '<div class="story-highlight">' + highlight + '</div>' : '') +
                '<div class="story-section-body">' +
                    '<p>' + (sec.body || sec.narrative || sec.content || '') + '</p>' +
                    (chartHtml ? '<div class="story-chart mt-3">' + chartHtml + '</div>' : '') +
                '</div>' +
            '</div>';
        }).join("");
    }

    // 核心结论
    const takeawaysEl = document.getElementById("story-takeaways-list");
    if (takeawaysEl && (data.key_takeaways || data.takeaways)) {
        var takeaways = data.key_takeaways || data.takeaways;
        takeawaysEl.innerHTML = takeaways.map(function (t) {
            return '<li class="mb-2 d-flex align-items-start gap-2">' +
                '<span style="color:var(--yellow);flex-shrink:0">\u25B8</span>' +
                '<span>' + t + '</span></li>';
        }).join("");
    }

    // 动画入场
    const container = document.getElementById("story-container");
    container.style.opacity   = "0";
    container.style.transform = "translateY(12px)";
    requestAnimationFrame(function () {
        container.style.transition = "all 0.45s cubic-bezier(.16,1,.3,1)";
        container.style.opacity    = "1";
        container.style.transform  = "translateY(0)";
    });

    document.getElementById("gen-btn").disabled = false;
}

// ── 下载 Markdown ─────────────────────────────────────────────
function downloadReport() {
    if (!_reportMarkdown) return;
    const blob = new Blob([_reportMarkdown], { type: "text/markdown;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement("a"), {
        href:     url,
        download: `DataMind_报告_${new Date().toISOString().slice(0,10)}.md`,
    });
    // 挂载到 DOM 后触发，确保跨浏览器兼容
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
